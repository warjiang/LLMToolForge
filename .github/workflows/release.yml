name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version for the release (e.g. v0.1.0)"
        required: true
        default: "v0.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            label: macos-arm64
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # macOS Intel
          - os: macos-latest
            label: macos-x64
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # Linux x64 (skip AppImage: linuxdeploy can't ldd the bun sidecar)
          - os: ubuntu-22.04
            label: linux-x64
            rust-target: ""
            args: "--bundles deb,rpm"
          # Windows x64
          - os: windows-latest
            label: windows-x64
            rust-target: ""
            args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Releasing tag $TAG"
          bash scripts/set-version.sh "$TAG"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Compile the Portkey gateway sidecar for this platform's target triple so
      # `tauri build` finds binaries/portkey-gateway-<triple> to embed.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build gateway sidecar
        working-directory: sidecar
        shell: bash
        run: |
          bun install --frozen-lockfile
          if [ -n "${{ matrix.rust-target }}" ]; then
            bun run build.ts --target=${{ matrix.rust-target }}
          else
            bun run build.ts
          fi

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AppImage bundling on FUSE-less CI runners
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: true
          # macOS code signing (optional — set as repo secrets to enable)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing (optional)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "LLMToolForge ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "See the assets below to download and install this version. The desktop app will auto-update from these artifacts."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
